<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
<title>拼夕夕游乐园</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#172033;color:#fff}button,input{font:inherit}body{display:flex;justify-content:center;background:radial-gradient(circle at 50% -10%,#61e4ff 0,#1185e8 28%,#7bd7e7 50%,#d79b4e 82%,#7a3f1e 100%)}.app{width:min(100vw,460px);height:100vh;max-height:940px;position:relative;padding:max(10px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px;overflow:hidden}.top{display:flex;align-items:center;justify-content:space-between;gap:8px}.player{display:flex;align-items:center;gap:9px;min-width:0}.avatar{width:43px;height:43px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(180deg,#fff6ca,#ffbb42);box-shadow:0 5px 0 #a65315;color:#6e2700;font-size:24px;border:3px solid rgba(255,255,255,.85)}.name{font-weight:1000;font-size:17px;max-width:122px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 2px 0 rgba(0,0,0,.2)}.sub{font-size:11px;color:rgba(255,255,255,.82);margin-top:2px}.scoreBox{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;flex:1}.stat{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:7px 4px;text-align:center;backdrop-filter:blur(8px)}.stat span{display:block;font-size:10px;color:rgba(255,255,255,.7)}.stat b{font-size:18px;color:#fff2a6}.brandLogo{width:66px;height:66px;border-radius:50%;margin:0 auto 10px;display:grid;place-items:center;background:radial-gradient(circle at 36% 26%,#fff9c9 0 13%,#ffe26a 14% 46%,#ffb322 47% 72%,#e66b00 73% 100%);border:5px solid #ff495f;box-shadow:0 7px 0 #a93b00,0 10px 22px rgba(0,0,0,.24),inset 0 3px 0 rgba(255,255,255,.55);color:#d82b00;font-size:37px;font-weight:1000;text-shadow:0 2px 0 rgba(255,255,255,.5)}.brandLogo.small{width:40px;height:40px;margin:0 8px 0 0;border-width:3px;box-shadow:0 4px 0 #a93b00,0 5px 12px rgba(0,0,0,.18);font-size:24px;flex:0 0 auto}.machine{position:relative;flex:1;min-height:420px;border-radius:28px;padding:13px;background:linear-gradient(180deg,#ffdb7b 0,#ff9b2f 14%,#c85b24 100%);box-shadow:inset 0 0 0 4px rgba(255,255,255,.35),0 16px 34px rgba(70,32,5,.38);overflow:hidden}.marquee{height:64px;border-radius:18px;background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.3),transparent 24%),linear-gradient(180deg,#ff426f,#ff7b35);border:3px solid #ffe9a8;display:flex;align-items:center;justify-content:center;text-align:left;font-weight:1000;text-shadow:0 2px 0 rgba(136,30,0,.45);box-shadow:0 6px 0 rgba(107,47,8,.3)}.brandText{line-height:1}.brandText b{display:block;font-size:22px;letter-spacing:.5px}.brandText span{font-size:11px;color:#fff6bf}.boardWrap{position:absolute;left:22px;right:22px;top:94px;bottom:18px;border-radius:16px;background:linear-gradient(180deg,#1d0c05,#5e2d16 58%,#9e5b2d);overflow:hidden;box-shadow:inset 0 0 28px rgba(0,0,0,.55),0 0 0 4px rgba(117,55,15,.35)}canvas{display:block;width:100%;height:100%}.slot{position:absolute;top:78px;width:32px;height:32px;border-radius:50%;background:linear-gradient(180deg,#fff7c5,#ffc228);border:3px solid #fff;box-shadow:0 4px 0 #9a4b00,0 0 16px rgba(255,236,100,.85);z-index:6;transform:translateX(-50%);display:grid;place-items:center;color:#b94700;font-weight:1000}.hint{position:absolute;left:50%;top:139px;transform:translateX(-50%);z-index:7;padding:7px 12px;border-radius:999px;background:rgba(0,0,0,.55);font-size:12px;font-weight:800;color:#fff7c4;opacity:.92;white-space:nowrap}.controls{display:grid;grid-template-columns:1fr 1fr;gap:9px}.mainBtn{grid-column:1/3;height:64px;border:0;border-radius:22px;background:linear-gradient(180deg,#fff2a8,#ffc126 56%,#ff7619);color:#7b2700;font-size:24px;font-weight:1000;box-shadow:0 8px 0 #9e3e00,0 13px 22px rgba(0,0,0,.24)}.mainBtn:active{transform:translateY(5px);box-shadow:0 3px 0 #9e3e00,0 7px 12px rgba(0,0,0,.24)}.mainBtn:disabled{filter:grayscale(.6);opacity:.55;transform:none}.smallBtn{height:42px;border:0;border-radius:16px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);color:#fff;font-weight:900}.toast{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.85);z-index:30;background:rgba(0,0,0,.72);border-radius:16px;padding:10px 16px;font-weight:1000;color:#fff2a6;opacity:0;transition:.22s ease;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,-78%) scale(1)}.panel{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:22px;background:rgba(9,19,36,.55);backdrop-filter:blur(8px)}.card{width:min(100%,350px);border-radius:28px;background:linear-gradient(180deg,#fff8c9,#ffd46a 38%,#ff8b46);color:#6b2500;box-shadow:0 24px 60px rgba(0,0,0,.38),inset 0 0 0 4px rgba(255,255,255,.36);padding:22px 18px 18px;text-align:center}.card h1{margin:0;font-size:33px;line-height:1;font-weight:1000}.card p{margin:9px 0 14px;font-size:14px;line-height:1.45;color:rgba(102,34,0,.76);font-weight:800}.nick{width:100%;height:46px;border:0;border-radius:16px;padding:0 14px;background:rgba(255,255,255,.72);color:#622200;font-weight:900;text-align:center;outline:none}.avatars{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}.pick{height:44px;border:0;border-radius:15px;background:rgba(255,255,255,.42);font-size:24px;box-shadow:inset 0 0 0 2px transparent}.pick.active{background:#fff4b1;box-shadow:inset 0 0 0 3px #ff4b82,0 4px 10px rgba(0,0,0,.16)}.startBtn{width:100%;height:54px;border:0;border-radius:999px;background:linear-gradient(180deg,#fff4ad,#ffc426 60%,#ff820e);color:#762600;font-size:21px;font-weight:1000;box-shadow:0 7px 0 #a74600}.result{display:none}.ruleLine{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}.ruleLine div{border-radius:14px;background:rgba(255,255,255,.38);padding:9px 6px;font-size:12px;font-weight:900}@media(max-height:760px){.marquee{height:54px}.boardWrap{top:84px}.slot{top:70px}.machine{min-height:360px}.mainBtn{height:56px}.stat b{font-size:16px}.hint{display:none}.card{padding-top:18px}.card h1{font-size:30px}.ruleLine{display:none}.brandLogo{width:58px;height:58px;font-size:32px;margin-bottom:8px}}
</style>
</head>
<body>
<main class="app">
  <section class="top">
    <div class="player"><div class="avatar" id="topAvatar">😄</div><div><div class="name" id="topName">玩家</div><div class="sub">不拼单，只拼手气</div></div></div>
    <div class="scoreBox"><div class="stat"><span>得分</span><b id="score">0</b></div><div class="stat"><span>剩余</span><b id="shots">30</b></div><div class="stat"><span>目标</span><b>50</b></div></div>
  </section>
  <section class="machine">
    <div class="marquee"><div class="brandLogo small">￥</div><div class="brandText"><b>拼夕夕游乐园</b><span>不拼单，只拼手气</span></div></div>
    <div class="slot" id="slot">↓</div>
    <div class="hint" id="hint">点击台面上方选择落币位置</div>
    <div class="boardWrap"><canvas id="game"></canvas></div>
    <div class="toast" id="toast">+1</div>
  </section>
  <section class="controls">
    <button class="mainBtn" id="dropBtn">投币推动</button>
    <button class="smallBtn" id="rulesBtn">规则</button>
    <button class="smallBtn" id="restartBtn">重开一局</button>
  </section>
</main>
<div class="panel" id="startPanel">
  <div class="card">
    <div class="brandLogo">￥</div>
    <h1>拼夕夕游乐园</h1>
    <p>不拼单，只拼手气</p>
    <input id="nickInput" class="nick" maxlength="8" placeholder="输入昵称" />
    <div class="avatars" id="avatarList"></div>
    <div class="ruleLine"><div>30 次投币</div><div>50 分通关</div><div>前方得分</div><div>侧边损失</div></div>
    <button class="startBtn" id="startBtn">开始游戏</button>
  </div>
</div>
<div class="panel result" id="resultPanel">
  <div class="card"><div class="brandLogo">￥</div><h1 id="resultTitle">本局结束</h1><p id="resultText"></p><button class="startBtn" id="againBtn">再来一局</button></div>
</div>
<script>
const cvs=document.getElementById('game'),ctx=cvs.getContext('2d'),slot=document.getElementById('slot'),toast=document.getElementById('toast'),dropBtn=document.getElementById('dropBtn'),restartBtn=document.getElementById('restartBtn'),rulesBtn=document.getElementById('rulesBtn'),scoreEl=document.getElementById('score'),shotsEl=document.getElementById('shots'),startPanel=document.getElementById('startPanel'),resultPanel=document.getElementById('resultPanel'),resultTitle=document.getElementById('resultTitle'),resultText=document.getElementById('resultText'),againBtn=document.getElementById('againBtn'),nickInput=document.getElementById('nickInput'),avatarList=document.getElementById('avatarList'),topName=document.getElementById('topName'),topAvatar=document.getElementById('topAvatar'),hint=document.getElementById('hint');
const AV=['😄','🐱','🐶','🐼','🦊','🐵','🐸','🐯','🐰','⭐'],PROFILE_KEY='coinPusherProfileV2';
const CFG={shots:30,target:50,startCoins:38,maxCoins:56};let W=300,H=420,dpr=1,coins=[],sparks=[],dropX=.5,pusherT=0,activeUntil=0,score=0,shots=30,lost=0,ended=false,lastUi=0,selectedAvatar='😄',audio=null,soundReady=false,paused=false;
function loadProfile(){try{return JSON.parse(localStorage.getItem(PROFILE_KEY)||'{}')}catch(e){return {}}}
function saveProfile(){localStorage.setItem(PROFILE_KEY,JSON.stringify({name:nickInput.value.trim()||'玩家',avatar:selectedAvatar}))}
function renderAvatars(){avatarList.innerHTML=AV.map(a=>`<button class="pick ${a===selectedAvatar?'active':''}" data-a="${a}">${a}</button>`).join('');avatarList.querySelectorAll('button').forEach(b=>b.onclick=()=>{selectedAvatar=b.dataset.a;renderAvatars()})}
const pf=loadProfile();nickInput.value=pf.name||'';selectedAvatar=pf.avatar||'😄';renderAvatars();
function resize(){const r=cvs.getBoundingClientRect();dpr=window.devicePixelRatio||1;W=Math.floor(r.width);H=Math.floor(r.height);cvs.width=Math.floor(W*dpr);cvs.height=Math.floor(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);setSlot()}window.addEventListener('resize',resize);document.addEventListener('visibilitychange',()=>paused=document.hidden);resize();
function rand(a,b){return Math.random()*(b-a)+a}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function active(){return performance.now()<activeUntil}function play(f,d=.05,t='sine',g=.025){if(!soundReady)return;try{audio=audio||new(window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),v=audio.createGain();o.type=t;o.frequency.value=f;v.gain.value=g;o.connect(v);v.connect(audio.destination);o.start();v.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.stop(audio.currentTime+d)}catch(e){}}
function board(){return{dropTop:16,dropBottom:H*.28,tableTop:H*.29,edgeY:H*.82,frontY:H-38,leftPit:W*.16,rightPit:W*.84}}
function setSlot(){slot.style.left=(22+dropX*W)+'px'}
function newGame(){score=0;shots=CFG.shots;lost=0;ended=false;activeUntil=0;pusherT=0;coins=[];sparks=[];seedCoins();ui(true);resultPanel.style.display='none';hint.style.display='block'}
function seedCoins(){let b=board();for(let i=0;i<CFG.startCoins;i++){let row=Math.floor(i/8),col=i%8;coins.push(makeCoin(W*.2+col*(W*.6/7)+rand(-8,8),b.tableTop+62+row*23+rand(-7,7),false))}}
function makeCoin(x,y,fresh=true){let r=Math.random(),kind=r>.96?'star':r>.82?'big':'normal';let val=kind==='star'?10:kind==='big'?5:1;let rad=kind==='star'?15:kind==='big'?14:12;return{x,y,r:rad,vx:rand(-.22,.22),vy:fresh?rand(1.2,1.8):0,rot:rand(0,6.28),kind,val,fresh,dead:false}}
function dropCoin(){if(ended||shots<=0||active())return;shots--;let b=board();coins.push(makeCoin(W*.12+dropX*W*.76,b.dropTop+4,true));activeUntil=performance.now()+4200;hint.style.display='none';ui(true);play(720,.05,'triangle');if(navigator.vibrate)navigator.vibrate(18)}
function win(c){score+=c.val;burst(c.x,board().frontY,c.kind==='star'?20:12);showToast('+'+c.val);play(c.val>1?1050:850,.06,'square',.018);if(navigator.vibrate)navigator.vibrate(c.val>1?[20,30,20]:12)}
function lose(c){lost++;burst(c.x,c.y,5);play(260,.04,'sine',.012)}
function showToast(t){toast.textContent=t;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),520)}
function burst(x,y,n){for(let i=0;i<n;i++)sparks.push({x,y,vx:rand(-2.3,2.3),vy:rand(-3,-.4),life:rand(18,34),r:rand(2,4)})}
function ui(force=false){let now=performance.now();if(!force&&now-lastUi<140)return;lastUi=now;scoreEl.textContent=score;shotsEl.textContent=shots;dropBtn.textContent=active()?'推动中':'投币推动';dropBtn.disabled=ended||shots<=0||active();topName.textContent=(nickInput.value.trim()||'玩家');topAvatar.textContent=selectedAvatar}
function maybeEnd(){if(ended||active()||shots>0)return;if(coins.some(c=>c.fresh&&c.y<board().tableTop))return;ended=true;setTimeout(()=>{resultTitle.textContent=score>=CFG.target?'恭喜通关':'差一点，再来一局';resultText.textContent=`${nickInput.value.trim()||'玩家'} 本局获得 ${score} 分，目标 ${CFG.target} 分，侧边损失 ${lost} 枚。`;resultPanel.style.display='grid'},450)}
function collideCoins(){let n=coins.length;for(let i=0;i<n;i++){let a=coins[i];if(a.dead)continue;for(let j=i+1;j<n;j++){let b=coins[j];if(b.dead)continue;let dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy),m=a.r+b.r-1;if(d>0&&d<m){let nx=dx/d,ny=dy/d,p=(m-d)*.5;a.x+=nx*p*.42;a.y+=ny*p*.42;b.x-=nx*p*.42;b.y-=ny*p*.42;let rel=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;if(rel<0){let imp=-rel*.28;a.vx+=nx*imp;b.vx-=nx*imp;a.vy+=ny*imp;b.vy-=ny*imp}}}}}
function update(){if(paused)return H*.3;let b=board(),is=active();if(is)pusherT+=.055;let travel=(Math.sin(pusherT-Math.PI/2)+1)/2, pushY=b.tableTop+travel*(H*.18), pushBottom=pushY+34;for(let c of coins){c.rot+=.035+Math.abs(c.vx)*.02;c.x+=c.vx;c.y+=c.vy;if(c.y<b.tableTop){c.vy+=.05;c.vx*=.995}else{c.vx*=.975;c.vy*=.965}if(is&&c.y>pushY-c.r*.55&&c.y<pushBottom+c.r&&c.x>20&&c.x<W-20){let overlap=pushBottom+c.r-c.y;c.y+=Math.max(.8,overlap*.28);c.vy+=.42+travel*.18;c.vx+=rand(-.05,.05)}if(is&&c.y>pushBottom)c.vy+=.018+.04*travel;if(c.y>b.tableTop+20)c.vy+=.006;if(c.x<c.r+3){c.x=c.r+3;c.vx=Math.abs(c.vx)*.55}if(c.x>W-c.r-3){c.x=W-c.r-3;c.vx=-Math.abs(c.vx)*.55}if(c.y>b.edgeY&&(c.x<b.leftPit||c.x>b.rightPit)){c.dead=true;lose(c)}else if(c.y>b.frontY&&c.x>b.leftPit&&c.x<b.rightPit){c.dead=true;win(c)}}collideCoins();coins=coins.filter(c=>!c.dead).slice(-CFG.maxCoins);sparks=sparks.filter(s=>s.life>0);for(let s of sparks){s.life--;s.x+=s.vx;s.y+=s.vy;s.vy+=.13}ui();maybeEnd();return pushY}
function drawCoin(c){ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot);let g=ctx.createRadialGradient(-4,-5,1,0,0,c.r+5);if(c.kind==='star'){g.addColorStop(0,'#fff');g.addColorStop(.42,'#fff36a');g.addColorStop(.75,'#ff7b2b');g.addColorStop(1,'#bd3b00')}else if(c.kind==='big'){g.addColorStop(0,'#fff8ca');g.addColorStop(.46,'#ffd84e');g.addColorStop(.8,'#ef9a00');g.addColorStop(1,'#9b4c00')}else{g.addColorStop(0,'#fff6b8');g.addColorStop(.5,'#ffd24b');g.addColorStop(1,'#b76200')}ctx.fillStyle=g;ctx.shadowColor='rgba(0,0,0,.32)';ctx.shadowBlur=5;ctx.shadowOffsetY=2;ctx.beginPath();ctx.ellipse(0,0,c.r,c.r*.76,0,0,6.28);ctx.fill();ctx.shadowColor='transparent';ctx.lineWidth=1.8;ctx.strokeStyle='rgba(255,255,255,.62)';ctx.stroke();ctx.fillStyle='#c74600';ctx.font=`900 ${c.r*.85}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(c.kind==='star'?'★':c.val,0,1);ctx.restore()}
function label(t,x,y,w,bg){ctx.fillStyle=bg;round(x,y,w,22,11);ctx.fill();ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='900 12px Arial';ctx.textAlign='center';ctx.fillText(t,x+w/2,y+15)}
function draw(){ctx.clearRect(0,0,W,H);let b=board(),bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#1d0b04');bg.addColorStop(.46,'#643119');bg.addColorStop(1,'#9b592d');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.08)';ctx.beginPath();ctx.moveTo(W*.16,0);ctx.lineTo(W*.4,0);ctx.lineTo(W*.27,H);ctx.lineTo(W*.03,H);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(255,238,128,.12)';ctx.fillRect(0,0,W,b.dropBottom);ctx.fillStyle='rgba(120,70,22,.38)';ctx.fillRect(0,b.tableTop,W,b.frontY-b.tableTop);ctx.fillStyle='rgba(0,0,0,.24)';ctx.fillRect(0,b.edgeY,b.leftPit,H-b.edgeY);ctx.fillRect(b.rightPit,b.edgeY,W-b.rightPit,H-b.edgeY);ctx.fillStyle='rgba(19,214,111,.32)';ctx.fillRect(b.leftPit,b.frontY,W*(.68),H-b.frontY);label('金币掉落区',W*.5-48,8,96,'rgba(0,0,0,.28)');label('桌面堆积区',W*.5-52,b.tableTop+8,104,'rgba(0,0,0,.25)');label('奖励槽',W*.5-36,b.frontY+8,72,'rgba(15,180,92,.45)');let py=update();ctx.fillStyle='#60a7ff';round(18,py,W-36,34,10);ctx.fill();ctx.fillStyle='rgba(255,255,255,.34)';ctx.fillRect(28,py+5,W-56,5);coins.sort((a,b)=>a.y-b.y).forEach(drawCoin);for(let s of sparks){ctx.globalAlpha=Math.max(0,s.life/34);ctx.fillStyle='#fff36d';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();ctx.globalAlpha=1}requestAnimationFrame(draw)}
function round(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
cvs.addEventListener('pointerdown',e=>{const r=cvs.getBoundingClientRect();dropX=clamp((e.clientX-r.left)/r.width,.05,.95);setSlot()});cvs.addEventListener('pointermove',e=>{if(e.buttons||e.pointerType==='touch'){const r=cvs.getBoundingClientRect();dropX=clamp((e.clientX-r.left)/r.width,.05,.95);setSlot()}});
dropBtn.onclick=dropCoin;restartBtn.onclick=()=>{newGame();showToast('新的一局')};rulesBtn.onclick=()=>showToast('前方得分，侧边损失');againBtn.onclick=()=>newGame();startBtn.onclick=()=>{saveProfile();soundReady=true;startPanel.style.display='none';newGame();play(660,.07,'triangle')};newGame();draw();
</script>
</body>
</html>
