<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>家庭推金币</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#172033;color:#fff}button,input{font:inherit}body{display:flex;justify-content:center;background:radial-gradient(circle at 50% -10%,#51d8ff 0,#1185e8 28%,#7bd7e7 50%,#d79b4e 82%,#7a3f1e 100%)}.app{width:min(100vw,460px);height:100vh;max-height:940px;position:relative;padding:max(10px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px;overflow:hidden}.top{display:flex;align-items:center;justify-content:space-between;gap:8px}.player{display:flex;align-items:center;gap:9px;min-width:0}.avatar{width:43px;height:43px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(180deg,#fff6ca,#ffbb42);box-shadow:0 5px 0 #a65315;color:#6e2700;font-size:24px;border:3px solid rgba(255,255,255,.85)}.name{font-weight:1000;font-size:17px;max-width:122px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 2px 0 rgba(0,0,0,.2)}.sub{font-size:11px;color:rgba(255,255,255,.78);margin-top:2px}.scoreBox{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;flex:1}.stat{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:7px 4px;text-align:center;backdrop-filter:blur(8px)}.stat span{display:block;font-size:10px;color:rgba(255,255,255,.7)}.stat b{font-size:18px;color:#fff2a6}.machine{position:relative;flex:1;min-height:420px;border-radius:28px;padding:13px;background:linear-gradient(180deg,#ffdb7b 0,#ff9b2f 14%,#c85b24 100%);box-shadow:inset 0 0 0 4px rgba(255,255,255,.35),0 16px 34px rgba(70,32,5,.38);overflow:hidden}.marquee{height:58px;border-radius:18px;background:linear-gradient(180deg,#ff426f,#ff7b35);border:3px solid #ffe9a8;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:1000;font-size:24px;text-shadow:0 2px 0 rgba(136,30,0,.45);box-shadow:0 6px 0 rgba(107,47,8,.3)}.boardWrap{position:absolute;left:26px;right:26px;top:88px;bottom:18px;border-radius:16px;background:linear-gradient(180deg,#331406,#643018 72%,#9e5b2d);overflow:hidden;box-shadow:inset 0 0 28px rgba(0,0,0,.55),0 0 0 4px rgba(117,55,15,.35)}canvas{display:block;width:100%;height:100%}.slot{position:absolute;top:72px;width:32px;height:32px;border-radius:50%;background:linear-gradient(180deg,#fff7c5,#ffc228);border:3px solid #fff;box-shadow:0 4px 0 #9a4b00,0 0 16px rgba(255,236,100,.85);z-index:6;transform:translateX(-50%);display:grid;place-items:center;color:#b94700;font-weight:1000}.hint{position:absolute;left:50%;top:132px;transform:translateX(-50%);z-index:7;padding:7px 12px;border-radius:999px;background:rgba(0,0,0,.55);font-size:12px;font-weight:800;color:#fff7c4;opacity:.92;white-space:nowrap}.controls{display:grid;grid-template-columns:1fr 1fr;gap:9px}.mainBtn{grid-column:1/3;height:64px;border:0;border-radius:22px;background:linear-gradient(180deg,#fff2a8,#ffc126 56%,#ff7619);color:#7b2700;font-size:24px;font-weight:1000;box-shadow:0 8px 0 #9e3e00,0 13px 22px rgba(0,0,0,.24)}.mainBtn:active{transform:translateY(5px);box-shadow:0 3px 0 #9e3e00,0 7px 12px rgba(0,0,0,.24)}.mainBtn:disabled{filter:grayscale(.6);opacity:.55;transform:none}.smallBtn{height:42px;border:0;border-radius:16px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);color:#fff;font-weight:900}.toast{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.85);z-index:30;background:rgba(0,0,0,.72);border-radius:16px;padding:10px 16px;font-weight:1000;color:#fff2a6;opacity:0;transition:.22s ease;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,-78%) scale(1)}.panel{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:22px;background:rgba(9,19,36,.55);backdrop-filter:blur(8px)}.card{width:min(100%,350px);border-radius:28px;background:linear-gradient(180deg,#fff8c9,#ffd46a 38%,#ff8b46);color:#6b2500;box-shadow:0 24px 60px rgba(0,0,0,.38),inset 0 0 0 4px rgba(255,255,255,.36);padding:24px 18px 18px;text-align:center}.card h1{margin:0;font-size:34px;line-height:1;font-weight:1000}.card p{margin:10px 0 16px;font-size:13px;line-height:1.55;color:rgba(102,34,0,.72)}.nick{width:100%;height:46px;border:0;border-radius:16px;padding:0 14px;background:rgba(255,255,255,.7);color:#622200;font-weight:900;text-align:center;outline:none}.avatars{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}.pick{height:44px;border:0;border-radius:15px;background:rgba(255,255,255,.42);font-size:24px;box-shadow:inset 0 0 0 2px transparent}.pick.active{background:#fff4b1;box-shadow:inset 0 0 0 3px #ff4b82,0 4px 10px rgba(0,0,0,.16)}.startBtn{width:100%;height:54px;border:0;border-radius:999px;background:linear-gradient(180deg,#fff4ad,#ffc426 60%,#ff820e);color:#762600;font-size:21px;font-weight:1000;box-shadow:0 7px 0 #a74600}.result{display:none}.ruleLine{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}.ruleLine div{border-radius:14px;background:rgba(255,255,255,.38);padding:9px 6px;font-size:12px;font-weight:900}@media(max-height:760px){.marquee{height:48px;font-size:21px}.boardWrap{top:76px}.machine{min-height:360px}.mainBtn{height:56px}.stat b{font-size:16px}.hint{display:none}.card{padding-top:20px}.card h1{font-size:30px}.ruleLine{display:none}}
</style>
</head>
<body>
<main class="app">
  <section class="top">
    <div class="player"><div class="avatar" id="topAvatar">😄</div><div><div class="name" id="topName">玩家</div><div class="sub">家庭娱乐版</div></div></div>
    <div class="scoreBox"><div class="stat"><span>得分</span><b id="score">0</b></div><div class="stat"><span>剩余</span><b id="shots">30</b></div><div class="stat"><span>目标</span><b>50</b></div></div>
  </section>
  <section class="machine">
    <div class="marquee">家庭推金币</div>
    <div class="slot" id="slot">↓</div>
    <div class="hint" id="hint">点击台面上方选择投币位置</div>
    <div class="boardWrap"><canvas id="game"></canvas></div>
    <div class="toast" id="toast">+1</div>
  </section>
  <section class="controls">
    <button class="mainBtn" id="dropBtn">投币</button>
    <button class="smallBtn" id="rulesBtn">规则</button>
    <button class="smallBtn" id="restartBtn">重开一局</button>
  </section>
</main>
<div class="panel" id="startPanel">
  <div class="card">
    <h1>家庭推金币</h1>
    <p>选择昵称和头像，用 30 次投币把金币推入前方奖励槽。侧边掉落不计分。</p>
    <input id="nickInput" class="nick" maxlength="8" placeholder="输入昵称" />
    <div class="avatars" id="avatarList"></div>
    <div class="ruleLine"><div>30 次投币</div><div>50 分通关</div><div>前方得分</div><div>侧边损失</div></div>
    <button class="startBtn" id="startBtn">开始游戏</button>
  </div>
</div>
<div class="panel result" id="resultPanel">
  <div class="card"><h1 id="resultTitle">本局结束</h1><p id="resultText"></p><button class="startBtn" id="againBtn">再来一局</button></div>
</div>
<script>
const cvs=document.getElementById('game'),ctx=cvs.getContext('2d'),slot=document.getElementById('slot'),toast=document.getElementById('toast'),dropBtn=document.getElementById('dropBtn'),restartBtn=document.getElementById('restartBtn'),rulesBtn=document.getElementById('rulesBtn'),scoreEl=document.getElementById('score'),shotsEl=document.getElementById('shots'),startPanel=document.getElementById('startPanel'),resultPanel=document.getElementById('resultPanel'),resultTitle=document.getElementById('resultTitle'),resultText=document.getElementById('resultText'),againBtn=document.getElementById('againBtn'),nickInput=document.getElementById('nickInput'),avatarList=document.getElementById('avatarList'),topName=document.getElementById('topName'),topAvatar=document.getElementById('topAvatar');
const AV=['😄','🐱','🐶','🐼','🦊','🐵','🐸','🐯','🐰','⭐'],PROFILE_KEY='coinPusherProfileV1';
const CFG={shots:30,target:50,startCoins:35,maxCoins:52};let W=300,H=420,dpr=1,coins=[],sparks=[],dropX=.5,pusher=0,activeUntil=0,score=0,shots=30,ended=false,lastUi=0,selectedAvatar='😄',audio=null,soundReady=false;
function loadProfile(){try{return JSON.parse(localStorage.getItem(PROFILE_KEY)||'{}')}catch(e){return {}}}
function saveProfile(){localStorage.setItem(PROFILE_KEY,JSON.stringify({name:nickInput.value.trim()||'玩家',avatar:selectedAvatar}))}
function renderAvatars(){avatarList.innerHTML=AV.map(a=>`<button class="pick ${a===selectedAvatar?'active':''}" data-a="${a}">${a}</button>`).join('');avatarList.querySelectorAll('button').forEach(b=>b.onclick=()=>{selectedAvatar=b.dataset.a;renderAvatars()})}
const pf=loadProfile();nickInput.value=pf.name||'';selectedAvatar=pf.avatar||'😄';renderAvatars();
function resize(){const r=cvs.getBoundingClientRect();dpr=window.devicePixelRatio||1;W=Math.floor(r.width);H=Math.floor(r.height);cvs.width=Math.floor(W*dpr);cvs.height=Math.floor(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);setSlot()}window.addEventListener('resize',resize);resize();
function rand(a,b){return Math.random()*(b-a)+a}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function active(){return performance.now()<activeUntil}function play(f,d=.05,t='sine',g=.025){if(!soundReady)return;try{audio=audio||new(window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),v=audio.createGain();o.type=t;o.frequency.value=f;v.gain.value=g;o.connect(v);v.connect(audio.destination);o.start();v.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.stop(audio.currentTime+d)}catch(e){}}
function setSlot(){slot.style.left=(26+dropX*(W-0))+'px'}
function newGame(){score=0;shots=CFG.shots;ended=false;activeUntil=0;pusher=0;coins=[];sparks=[];seedCoins();ui(true);resultPanel.style.display='none'}
function seedCoins(){const rows=5;for(let i=0;i<CFG.startCoins;i++){let row=Math.floor(i/7),col=i%7;coins.push(makeCoin(rand(W*.18,W*.82)+(col-3)*3,H*.45+row*28+rand(-9,9),false))}}
function makeCoin(x,y,fresh=true){let r=Math.random(),kind=r>.95?'star':r>.82?'big':'normal';let val=kind==='star'?10:kind==='big'?5:1;return{x,y,r:kind==='star'?15:kind==='big'?14:12,vx:rand(-.3,.3),vy:fresh?rand(1.2,1.9):0,rot:rand(0,6.28),kind,val,settle:0}}
function dropCoin(){if(ended||shots<=0||active())return;shots--;coins.push(makeCoin(W*.12+dropX*W*.76,22,true));activeUntil=performance.now()+3800;document.getElementById('hint').style.display='none';ui(true);play(720,.05,'triangle')}
function win(c){score+=c.val;burst(c.x,H-28,c.kind==='star'?18:10);showToast('+'+c.val);play(c.val>1?1050:850,.06,'square',.018)}
function showToast(t){toast.textContent=t;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),520)}
function burst(x,y,n){for(let i=0;i<n;i++)sparks.push({x,y,vx:rand(-2.3,2.3),vy:rand(-3,-.4),life:rand(18,34),r:rand(2,4)})}
function ui(force=false){let now=performance.now();if(!force&&now-lastUi<160)return;lastUi=now;scoreEl.textContent=score;shotsEl.textContent=shots;dropBtn.textContent=active()?'推动中':'投币';dropBtn.disabled=ended||shots<=0||active();topName.textContent=(nickInput.value.trim()||'玩家');topAvatar.textContent=selectedAvatar}
function maybeEnd(){if(ended||active()||shots>0)return;if(coins.some(c=>c.y<80&&c.vy>0))return;ended=true;setTimeout(()=>{resultTitle.textContent=score>=CFG.target?'通关成功':'本局结束';resultText.textContent=`${nickInput.value.trim()||'玩家'} 本局获得 ${score} 分，目标 ${CFG.target} 分。`;resultPanel.style.display='grid'},450)}
function update(){let is=active();if(is)pusher+=.09;let pushY=70+Math.sin(pusher)*28;let pushBottom=pushY+38;
 for(let c of coins){c.rot+=.04;c.x+=c.vx;c.y+=c.vy;if(c.y<90)c.vy+=.045;else{c.vx*=.985;c.vy*=.985}if(is&&c.y>pushY-4&&c.y<pushBottom+10&&c.x>20&&c.x<W-20){c.y=pushBottom+8;c.vy+=.75;c.vx+=rand(-.16,.16)}if(is&&c.y>pushBottom)c.vy+=.035;if(c.x<c.r+5){c.x=c.r+5;c.vx=Math.abs(c.vx)*.75}if(c.x>W-c.r-5){c.x=W-c.r-5;c.vx=-Math.abs(c.vx)*.75}for(let j=0;j<coins.length;j++){let o=coins[j];if(o===c)continue;let dx=c.x-o.x,dy=c.y-o.y,d=Math.hypot(dx,dy),m=c.r+o.r-2;if(d>0&&d<m){let p=(m-d)*.018;c.x+=dx/d*p;c.y+=dy/d*p;c.vx+=dx/d*.006;c.vy+=dy/d*.004}}}
 coins=coins.filter(c=>{if(c.y>H-18){if(c.x>W*.17&&c.x<W*.83)win(c);return false}if((c.x<18||c.x>W-18)&&c.y>H*.58)return false;return coins.length<CFG.maxCoins||c.y<H+30});
 sparks=sparks.filter(s=>s.life>0);for(let s of sparks){s.life--;s.x+=s.vx;s.y+=s.vy;s.vy+=.13}
 ui();maybeEnd();return pushY}
function drawCoin(c){ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot);let g=ctx.createRadialGradient(-4,-5,1,0,0,c.r+5);if(c.kind==='star'){g.addColorStop(0,'#fff');g.addColorStop(.42,'#fff36a');g.addColorStop(.75,'#ff7b2b');g.addColorStop(1,'#bd3b00')}else if(c.kind==='big'){g.addColorStop(0,'#fff8ca');g.addColorStop(.46,'#ffd84e');g.addColorStop(.8,'#ef9a00');g.addColorStop(1,'#9b4c00')}else{g.addColorStop(0,'#fff6b8');g.addColorStop(.5,'#ffd24b');g.addColorStop(1,'#b76200')}ctx.fillStyle=g;ctx.shadowColor='rgba(0,0,0,.32)';ctx.shadowBlur=5;ctx.shadowOffsetY=2;ctx.beginPath();ctx.ellipse(0,0,c.r,c.r*.76,0,0,6.28);ctx.fill();ctx.shadowColor='transparent';ctx.lineWidth=1.8;ctx.strokeStyle='rgba(255,255,255,.62)';ctx.stroke();ctx.fillStyle='#c74600';ctx.font=`900 ${c.r*.85}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(c.kind==='star'?'★':c.val,0,1);ctx.restore()}
function draw(){ctx.clearRect(0,0,W,H);let bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#211006');bg.addColorStop(.66,'#653119');bg.addColorStop(1,'#9b592d');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.08)';ctx.beginPath();ctx.moveTo(W*.17,0);ctx.lineTo(W*.38,0);ctx.lineTo(W*.25,H);ctx.lineTo(W*.04,H);ctx.closePath();ctx.fill();let py=update();ctx.fillStyle='rgba(0,0,0,.22)';ctx.fillRect(0,H-34,W*.16,34);ctx.fillRect(W*.84,H-34,W*.16,34);ctx.fillStyle='rgba(20,210,112,.28)';ctx.fillRect(W*.17,H-34,W*.66,34);ctx.fillStyle='#60a7ff';round(20,py,W-40,38,10);ctx.fill();ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(28,py+5,W-56,5);coins.forEach(drawCoin);for(let s of sparks){ctx.globalAlpha=Math.max(0,s.life/34);ctx.fillStyle='#fff36d';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();ctx.globalAlpha=1}requestAnimationFrame(draw)}
function round(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
cvs.addEventListener('pointerdown',e=>{const r=cvs.getBoundingClientRect();dropX=clamp((e.clientX-r.left)/r.width,.05,.95);setSlot()});cvs.addEventListener('pointermove',e=>{if(e.buttons||e.pointerType==='touch'){const r=cvs.getBoundingClientRect();dropX=clamp((e.clientX-r.left)/r.width,.05,.95);setSlot()}});
dropBtn.onclick=dropCoin;restartBtn.onclick=()=>{newGame();showToast('新的一局')};rulesBtn.onclick=()=>showToast('前方得分，侧边损失');againBtn.onclick=()=>newGame();startBtn.onclick=()=>{saveProfile();soundReady=true;startPanel.style.display='none';newGame();play(660,.07,'triangle')};newGame();draw();
</script>
</body>
</html>
