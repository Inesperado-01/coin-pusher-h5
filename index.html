#fffbd7,#ffd25e 70%,#ff9f1f);border-color:#ff44a2;box-shadow:0 0 0 3px rgba(118,255,150,.75),0 0 18px rgba(255,255,255,.7)}.mitem.active:before{opacity:1}.pusher{position:absolute;left:54px;right:54px;top:170px;height:52px;z-index:4;border-radius:4px 4px 11px 11px;background:linear-gradient(180deg,#56a4ff,#2467c4);box-shadow:0 8px 0 #1c4fa5,inset 0 3px 0 rgba(255,255,255,.22);transition:transform .12s linear}.field{position:absolute;left:54px;right:54px;top:204px;bottom:16px;z-index:2;border-radius:0 0 10px 10px;background:linear-gradient(90deg,rgba(255,255,255,.18),transparent 15%,transparent 85%,rgba(255,255,255,.18)),linear-gradient(180deg,#2d1709 0%,#4a230c 58%,#7b3b18 100%);overflow:hidden;box-shadow:inset 0 0 28px rgba(0,0,0,.55)}canvas{display:block;width:100%;height:100%}.bubble{position:absolute;left:50%;top:43%;transform:translate(-50%,-50%) scale(.86);background:rgba(0,0,0,.72);color:#fff;font-weight:1000;font-size:19px;border-radius:12px;padding:11px 18px;z-index:11;white-space:nowrap;opacity:0;transition:.2s ease}.bubble b{color:#fff033}.bubble.show{opacity:1;transform:translate(-50%,-72%) scale(1)}.card{position:relative;z-index:8;margin:-8px auto 0;width:calc(100% - 28px);min-height:238px;border-radius:22px;overflow:hidden;background:#fff;box-shadow:0 10px 22px rgba(80,38,5,.34);color:#333}.head{height:88px;display:grid;place-items:center;background:linear-gradient(135deg,#12d575,#06c967 55%,#23e58d);color:#fff;font-weight:1000;text-align:center;position:relative;overflow:hidden}.head:after{content:"";position:absolute;right:20px;top:-15px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.12)}.score{font-size:52px;line-height:.86;letter-spacing:-1px}.score small{font-size:24px}.label{font-size:22px;margin-top:4px}.medal{position:absolute;right:8px;top:55px;width:82px;height:82px;border-radius:50%;background:radial-gradient(circle,#ff4d74 0 48%,#ffe8b0 49% 66%,#e6aa52 67% 100%);display:grid;place-items:center;color:#fff6ca;font-weight:1000;font-size:15px;text-align:center;transform:rotate(-8deg);box-shadow:0 6px 14px rgba(0,0,0,.2);z-index:9}.body{padding:16px 16px 18px}.row{display:flex;gap:12px;align-items:flex-start}.check,.step{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-weight:1000;flex:0 0 auto}.check{background:#19ce72;color:#fff;font-size:22px}.step{background:#e9e9e9;color:#333;font-size:20px;margin-top:14px}.content h3{margin:0;font-size:22px;line-height:1.1}.content p{margin:7px 0 0;color:#9a9a9a;font-size:14px}.goal{margin-top:13px;font-size:19px;line-height:1.25;color:#16c86f;font-weight:1000}.goal b{color:#01b85b;font-size:22px}.marks{margin-top:13px;display:grid;grid-template-columns:repeat(5,1fr);gap:9px 0;align-items:center}.mark{text-align:center;color:#8f8f8f;font-weight:900;font-size:14px;position:relative}.mark:before{content:"";position:absolute;top:11px;left:-50%;width:100%;height:4px;background:#ffd43d;z-index:0}.mark:nth-child(5n+1):before{display:none}.mark i{position:relative;z-index:1;display:grid;place-items:center;width:24px;height:24px;border-radius:50%;margin:0 auto 4px;color:#ff9a00;background:#fff1a9;box-shadow:0 2px 5px rgba(255,174,0,.25);font-style:normal}.mark.locked:before{background:#ddd}.mark.locked i{background:#e8e8e8;color:#bbb}.bottom{position:absolute;left:0;right:0;bottom:max(8px,env(safe-area-inset-bottom));z-index:12;display:grid;grid-template-columns:1fr 1.35fr 1fr;gap:10px;align-items:end;padding:0 8px}button{border:none;outline:none;font-family:inherit;cursor:pointer}.pink{height:54px;border-radius:16px;color:#fff;font-weight:1000;font-size:18px;background:linear-gradient(180deg,#ff77b2,#ff226d);box-shadow:0 7px 0 #c81452,inset 0 2px 0 rgba(255,255,255,.3)}.main{height:70px;border-radius:17px;color:#fff;font-weight:1000;font-size:26px;background:linear-gradient(180deg,#ff9d39,#ff3b20);box-shadow:0 8px 0 #bf270f,0 0 0 7px rgba(255,231,139,.9),inset 0 3px 0 rgba(255,255,255,.3);display:grid;place-items:center;line-height:1.04}.main small{display:block;font-size:13px;font-weight:800;margin-top:5px}.main.running{animation:pulse .7s ease-in-out infinite alternate}@keyframes pulse{from{transform:translateY(0) scale(1)}to{transform:translateY(-2px) scale(1.02)}}.float{position:absolute;z-index:20;font-weight:1000;color:#fff93d;text-shadow:0 2px 0 #a63000,0 0 8px rgba(255,255,255,.35);pointer-events:none;animation:floatUp .8s ease-out forwards}@keyframes floatUp{from{opacity:1;transform:translateY(0) scale(.9)}to{opacity:0;transform:translateY(-45px) scale(1.15)}}.modal{position:fixed;inset:0;z-index:99;display:grid;place-items:center;padding:20px;background:rgba(0,25,50,.42);backdrop-filter:blur(8px);transition:.22s ease}.modal.hide{opacity:0;pointer-events:none}.modal-card{width:min(100%,360px);padding:22px 18px 18px;border-radius:26px;text-align:center;color:#7a2700;background:linear-gradient(180deg,#fff4bd,#ffbd42 42%,#ff7443 100%);box-shadow:0 18px 45px rgba(0,0,0,.32),inset 0 0 0 4px rgba(255,255,255,.35)}.modal-card h1{margin:0;font-size:31px;font-weight:1000}.modal-card p{margin:10px auto 15px;font-size:14px;line-height:1.55;color:rgba(105,31,0,.82)}.rules{display:grid;gap:8px;text-align:left;margin-bottom:16px}.rule{border-radius:14px;padding:9px 10px;background:rgba(255,255,255,.35);font-weight:900;font-size:13px}.start{width:100%;height:50px;border-radius:999px;background:linear-gradient(180deg,#fff8c9,#ffd03e 55%,#ff8d10);color:#802800;font-size:19px;font-weight:1000;box-shadow:0 7px 0 #b65000}@media(max-height:780px){.machine{margin-top:10px;height:50vh;min-height:360px}.board{height:76px}.sub strong{font-size:23px}.multi{top:84px;height:60px}.pusher{top:150px;height:46px}.field{top:180px}.card{min-height:218px}.head{height:76px}.score{font-size:43px}.label{font-size:19px}.pink{height:48px;font-size:16px}.main{height:62px;font-size:23px}}

<body>
<main class="app">
  <div class="top"><div class="back"></div><div></div></div>
  <div class="side"><button>规则</button><button id="resetBtn">重置</button></div>
  <section class="machine">
    <div class="frame"></div>
    <div class="board"><div class="avatar"></div><div class="line"><span class="tag">好友</span><b>积分喜报</b></div><div class="sub"><span id="friendName">家人</span> 刚获得 <strong id="friendScore">94.36</strong> 分</div></div>
    <div class="multi" id="multi"><div class="mitem active" data-m="10"><span>x10</span></div><div class="mitem" data-m="100"><span>x100</span></div><div class="mitem" data-m="20"><span>x20</span></div><div class="mitem" data-m="50"><span>x50</span></div></div>
    <div class="pusher" id="pusher"></div>
    <div class="field"><canvas id="gameCanvas"></canvas></div>
    <div class="bubble" id="bubble">还差 <b id="distanceText">0.08毫米</b>，推进即可获得积分</div>
  </section>
  <section class="card"><div class="head"><div><div class="score"><small>积分</small><span id="scoreText">84.20</span></div><div class="label">金币进度</div></div></div><div class="medal">家庭<br>娱乐版</div><div class="body"><div class="row"><div class="check">✓</div><div class="content"><h3>累计 70 分</h3><p id="dateText">今日记录</p></div></div><div class="row"><div class="step">2</div><div class="content"><div class="goal">差 <b id="goalDistance">0.08毫米</b> 推下积分卡，获得 <span id="goalScore">84.20</span> 分</div><div class="marks" id="marks"></div></div></div></div></section>
  <div class="bottom"><button class="pink">邀请好友</button><button class="main" id="mainBtn">抽取一次<small id="countText">今日剩余 80 次</small></button><button class="pink">扫码助力</button></div>
</main>
<div class="modal" id="modal"><div class="modal-card"><h1>推金币乐园</h1><p>家庭娱乐版 H5 Demo，金币和分数仅作娱乐记录，不充值、不兑换实物。</p><div class="rules"><div class="rule">🪙 点击“抽取一次”才会启动推板</div><div class="rule">🎯 掉入奖池可增加娱乐积分</div><div class="rule">🔥 倍率格会影响单次积分</div><div class="rule">✅ 仅供亲友休闲娱乐</div></div><button class="start" id="startBtn">开始试玩</button></div></div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),pusher=document.getElementById('pusher'),mainBtn=document.getElementById('mainBtn'),countText=document.getElementById('countText'),scoreText=document.getElementById('scoreText'),distanceText=document.getElementById('distanceText'),goalDistance=document.getElementById('goalDistance'),goalScore=document.getElementById('goalScore'),marks=document.getElementById('marks'),bubble=document.getElementById('bubble'),resetBtn=document.getElementById('resetBtn'),modal=document.getElementById('modal'),startBtn=document.getElementById('startBtn'),dateText=document.getElementById('dateText'),friendName=document.getElementById('friendName'),friendScore=document.getElementById('friendScore'),items=[...document.querySelectorAll('.mitem')];
const KEY='coin-pusher-h5-v3-safe',LIMIT=80,names=['小鹿','阿志','家人','朋友','好运星','Lucas'];let dpr=1,W=360,H=300,coins=[],sparks=[],runningUntil=0,phase=0,mult=10,sound=false,audio=null;
const def=()=>({date:new Date().toDateString(),score:84.20,left:LIMIT,draws:0,distance:.08,mark:1});let state=load();function load(){try{const s=JSON.parse(localStorage.getItem(KEY)||'null');return!s||s.date!==new Date().toDateString()?def():{...def(),...s}}catch(e){return def()}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function resize(){const r=canvas.getBoundingClientRect();dpr=window.devicePixelRatio||1;W=Math.max(260,r.width);H=Math.max(210,r.height);canvas.width=Math.floor(W*dpr);canvas.height=Math.floor(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0)}window.addEventListener('resize',resize);resize();function rand(a,b){return Math.random()*(b-a)+a}function run(){return performance.now()<runningUntil}function play(f,d=.06,t='sine',g=.025){if(!sound)return;try{audio=audio||new(window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),v=audio.createGain();o.type=t;o.frequency.value=f;v.gain.value=g;o.connect(v);v.connect(audio.destination);o.start();v.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.stop(audio.currentTime+d)}catch(e){}}
function setMult(){const p=[10,20,50,100];mult=p[Math.floor(Math.random()*p.length)];items.forEach(i=>i.classList.toggle('active',Number(i.dataset.m)===mult))}function ui(){scoreText.textContent=state.score.toFixed(2);goalScore.textContent=state.score.toFixed(2);const d=state.distance.toFixed(2)+'毫米';distanceText.textContent=d;goalDistance.textContent=d;countText.textContent=`今日剩余 ${state.left} 次`;dateText.textContent=new Date().toLocaleString('zh-CN',{hour12:false});mainBtn.classList.toggle('running',run());mainBtn.firstChild.nodeValue=run()?'抽取中':'抽取一次';renderMarks()}function renderMarks(){const v=['1毫米','0.9毫米','0.8毫米','0.7毫米','0.6毫米','0.5毫米','0.4毫米','0.3毫米','0.2毫米','0.1毫米'];marks.innerHTML=v.map((x,i)=>`<div class="mark ${i<state.mark?'':'locked'}"><i>${i<state.mark?'✓':''}</i>${x}</div>`).join('')}
function drawCoin(c){ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot);const g=ctx.createRadialGradient(-5,-6,1,0,0,c.r+7);g.addColorStop(0,'#fff9c8');g.addColorStop(.4,'#ffd84f');g.addColorStop(.78,'#f2a100');g.addColorStop(1,'#b56400');ctx.fillStyle=g;ctx.shadowColor='rgba(0,0,0,.34)';ctx.shadowBlur=7;ctx.shadowOffsetY=3;ctx.beginPath();ctx.ellipse(0,0,c.r,c.r*.78,0,0,Math.PI*2);ctx.fill();ctx.shadowColor='transparent';ctx.lineWidth=2;ctx.strokeStyle='rgba(255,255,255,.65)';ctx.stroke();ctx.fillStyle='#d14500';ctx.font=`900 ${c.r*.8}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(Math.random()>.68?'0.1':'★',0,1);ctx.restore()}
function seed(){if(coins.length>54)return;while(coins.length<42)coins.push({x:rand(-20,W+20),y:rand(H*.45,H*.96),r:rand(14,23),vx:rand(-.06,.06),vy:rand(.02,.08),rot:rand(0,Math.PI*2)})}function drop(n){for(let i=0;i<n;i++)coins.push({x:rand(W*.18,W*.82),y:rand(-22,12),r:rand(15,22),vx:rand(-.55,.55),vy:rand(1.3,2.1),rot:rand(0,Math.PI*2)})}function push(){if(state.left<=0||run())return;state.left--;state.draws++;runningUntil=performance.now()+3600;setMult();drop(Math.max(2,Math.floor(mult/20)));showBubble();save();ui();play(720,.05,'triangle')}function showBubble(){bubble.classList.add('show');clearTimeout(showBubble.t);showBubble.t=setTimeout(()=>bubble.classList.remove('show'),1100)}function spark(x,y,n=16){for(let i=0;i<n;i++)sparks.push({x,y,vx:rand(-2.4,2.4),vy:rand(-3.2,-.4),life:rand(22,38),r:rand(2,4)})}function floatText(t,x,y){const e=document.createElement('div');e.className='float';e.textContent=t;e.style.left=x+'px';e.style.top=y+'px';document.querySelector('.app').appendChild(e);setTimeout(()=>e.remove(),820)}
function updateCoins(){const active=run(),py=H*.22+(active?Math.sin(phase)*18:0);pusher.style.transform=`translateY(${active?Math.sin(phase)*18:0}px)`;coins.forEach(c=>{c.rot+=.045;if(active){c.y+=c.vy+.25;c.x+=c.vx;c.vy=Math.min(2.8,c.vy+.015);if(c.y<H*.36&&c.y>py-12){c.y+=1.8;c.vx+=rand(-.18,.18)}}else c.x+=Math.sin(performance.now()/900+c.r)*.015;if(c.x<-35)c.x=W+25;if(c.x>W+35)c.x=-25});coins=coins.filter(c=>{if(c.y>H+10){if(c.x>W*.18&&c.x<W*.82)win(c.x);return false}return true})}function win(x){const gain=Number((mult*.01*rand(.8,1.5)).toFixed(2));state.score+=gain;state.distance=Math.max(.01,state.distance-rand(.003,.012));if(state.distance<.011){state.distance=.1;state.mark=Math.min(10,state.mark+1);state.score+=5;floatText('+阶段奖励 5',innerWidth/2-70,innerHeight*.46)}save();ui();spark(x,H*.86,22);floatText('+'+gain.toFixed(2),x+35,innerHeight*.38);play(960,.06,'square',.018);setTimeout(()=>play(1180,.07,'triangle',.016),70)}function drawSparks(){sparks=sparks.filter(s=>s.life>0);sparks.forEach(s=>{s.life--;s.x+=s.vx;s.y+=s.vy;s.vy+=.12;ctx.globalAlpha=Math.max(0,s.life/38);ctx.fillStyle='#fff06b';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1})}
function draw(){ctx.clearRect(0,0,W,H);const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#2b1206');g.addColorStop(.7,'#7b3d18');g.addColorStop(1,'#b9732d');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.08)';ctx.beginPath();ctx.moveTo(W*.13,0);ctx.lineTo(W*.38,0);ctx.lineTo(W*.29,H);ctx.lineTo(W*.02,H);ctx.closePath();ctx.fill();seed();if(run())phase+=.12;updateCoins();coins.sort((a,b)=>a.y-b.y).forEach(drawCoin);drawSparks();ui();requestAnimationFrame(draw)}function notice(){friendName.textContent=names[Math.floor(Math.random()*names.length)];friendScore.textContent=rand(70,98).toFixed(2)}mainBtn.onclick=push;resetBtn.onclick=()=>{state=def();coins=[];sparks=[];runningUntil=0;phase=0;setMult();save();ui();showBubble()};startBtn.onclick=()=>{sound=true;modal.classList.add('hide');play(660,.08,'triangle');setTimeout(()=>play(880,.08,'triangle'),80)};setInterval(notice,4500);setMult();ui();draw();
</script>
</body>
</html>
