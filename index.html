<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#1797e9;color:#fff}button,input{font:inherit}body{display:flex;justify-content:center;background:radial-gradient(circle at 50% -10%,#67e7ff 0,#138df0 30%,#7fd8df 58%,#c99a56 100%)}.app{width:min(100vw,460px);height:100vh;max-height:940px;position:relative;padding:max(9px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:9px;overflow:hidden}.top{display:flex;align-items:center;justify-content:space-between;gap:8px}.player{display:flex;align-items:center;gap:8px;min-width:0}.avatar{width:43px;height:43px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(180deg,#fff6ca,#ffbd3b);box-shadow:0 5px 0 #a65315;color:#6e2700;font-size:24px;border:3px solid rgba(255,255,255,.9)}.name{font-weight:1000;font-size:17px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 2px 0 rgba(0,0,0,.18)}.sub{font-size:11px;color:rgba(255,255,255,.85);margin-top:2px}.scoreBox{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;flex:1}.stat{background:rgba(0,91,145,.42);border:1px solid rgba(255,255,255,.2);border-radius:15px;padding:7px 4px;text-align:center;box-shadow:inset 0 2px 0 rgba(255,255,255,.12)}.stat span{display:block;font-size:10px;color:rgba(255,255,255,.72)}.stat b{font-size:18px;color:#fff2a6}.machine{position:relative;flex:1;min-height:424px;border-radius:30px;padding:14px;background:linear-gradient(180deg,#ffdf83 0,#ff9b30 16%,#cb5a24 100%);box-shadow:inset 0 0 0 5px rgba(255,255,255,.34),0 16px 34px rgba(70,32,5,.36);overflow:hidden}.marquee{height:70px;border-radius:21px;background:radial-gradient(circle at 14% 20%,rgba(255,255,255,.32),transparent 24%),linear-gradient(180deg,#ff416c,#ff7437);border:4px solid #ffe9a8;display:flex;align-items:center;justify-content:center;text-align:left;font-weight:1000;text-shadow:0 2px 0 rgba(136,30,0,.45);box-shadow:0 8px 0 rgba(127,52,0,.28)}.brandLogo{width:66px;height:66px;border-radius:50%;margin:0 auto 10px;display:grid;place-items:center;background:radial-gradient(circle at 36% 26%,#fff9c9 0 13%,#ffe26a 14% 46%,#ffb322 47% 72%,#e66b00 73% 100%);border:5px solid #ff495f;box-shadow:0 7px 0 #a93b00,0 10px 22px rgba(0,0,0,.24),inset 0 3px 0 rgba(255,255,255,.55);color:#d82b00;font-size:37px;font-weight:1000;text-shadow:0 2px 0 rgba(255,255,255,.5)}.brandLogo.small{width:42px;height:42px;margin:0 10px 0 0;border-width:3px;box-shadow:0 4px 0 #a93b00,0 5px 12px rgba(0,0,0,.18);font-size:24px;flex:0 0 auto}.brandText{line-height:1}.brandText b{display:block;font-size:24px;letter-spacing:.5px}.brandText span{font-size:12px;color:#fff6bf}.boardWrap{position:absolute;left:20px;right:20px;top:104px;bottom:20px;border-radius:19px;background:linear-gradient(180deg,#201006,#371508 42%,#180802 100%);overflow:hidden;box-shadow:inset 0 0 32px rgba(0,0,0,.6),0 0 0 5px rgba(118,50,12,.42)}canvas{display:block;width:100%;height:100%}.controls{display:grid;grid-template-columns:1fr 1fr;gap:9px}.mainBtn{grid-column:1/3;height:64px;border:0;border-radius:22px;background:linear-gradient(180deg,#fff2a8,#ffc126 56%,#ff7619);color:#7b2700;font-size:25px;font-weight:1000;box-shadow:0 8px 0 #9e3e00,0 13px 22px rgba(0,0,0,.24)}.mainBtn:active{transform:translateY(5px);box-shadow:0 3px 0 #9e3e00,0 7px 12px rgba(0,0,0,.24)}.mainBtn:disabled{filter:grayscale(.45);opacity:.6;transform:none}.smallBtn{height:42px;border:0;border-radius:16px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);color:#fff;font-weight:900}.panel{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:22px;background:rgba(9,19,36,.55);backdrop-filter:blur(8px)}.card{width:min(100%,350px);border-radius:28px;background:linear-gradient(180deg,#fff8c9,#ffd46a 38%,#ff8b46);color:#6b2500;box-shadow:0 24px 60px rgba(0,0,0,.38),inset 0 0 0 4px rgba(255,255,255,.36);padding:22px 18px 18px;text-align:center}.card h1{margin:0;font-size:33px;line-height:1;font-weight:1000}.card p{margin:9px 0 14px;font-size:14px;line-height:1.45;color:rgba(102,34,0,.76);font-weight:800}.nick{width:100%;height:46px;border:0;border-radius:16px;padding:0 14px;background:rgba(255,255,255,.72);color:#622200;font-weight:900;text-align:center;outline:none}.avatars{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}.pick{height:44px;border:0;border-radius:15px;background:rgba(255,255,255,.42);font-size:24px;box-shadow:inset 0 0 0 2px transparent}.pick.active{background:#fff4b1;box-shadow:inset 0 0 0 3px #ff4b82,0 4px 10px rgba(0,0,0,.16)}.startBtn{width:100%;height:54px;border:0;border-radius:999px;background:linear-gradient(180deg,#fff4ad,#ffc426 60%,#ff820e);color:#762600;font-size:21px;font-weight:1000;box-shadow:0 7px 0 #a74600}.result{display:none}.ruleLine{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}.ruleLine div{border-radius:14px;background:rgba(255,255,255,.38);padding:9px 6px;font-size:12px;font-weight:900}@media(max-height:760px){.marquee{height:58px}.boardWrap{top:92px}.machine{min-height:370px}.mainBtn{height:56px}.stat b{font-size:16px}.card{padding-top:18px}.card h1{font-size:30px}.ruleLine{display:none}.brandLogo{width:58px;height:58px;font-size:32px;margin-bottom:8px}}

<body>
<main class="app"><section class="top"><div class="player"><div class="avatar" id="topAvatar">😄</div><div><div class="name" id="topName">玩家</div><div class="sub">不拼单，只拼手气</div></div></div><div class="scoreBox"><div class="stat"><span>得分</span><b id="score">0</b></div><div class="stat"><span>剩余</span><b id="shots">30</b></div><div class="stat"><span>目标</span><b>50</b></div></div></section><section class="machine"><div class="marquee"><div class="brandLogo small">￥</div><div class="brandText"><b>拼夕夕游乐园</b><span>不拼单，只拼手气</span></div></div><div class="boardWrap"><canvas id="game"></canvas></div></section><section class="controls"><button class="mainBtn" id="dropBtn">抽金币</button><button class="smallBtn" id="rulesBtn">规则</button><button class="smallBtn" id="restartBtn">重开一局</button></section></main>
<div class="panel" id="startPanel"><div class="card"><div class="brandLogo">￥</div><h1>拼夕夕游乐园</h1><p>不拼单，只拼手气</p><input id="nickInput" class="nick" maxlength="8" placeholder="输入昵称" /><div class="avatars" id="avatarList"></div><div class="ruleLine"><div>30 次抽币</div><div>50 分通关</div><div>抽 1/3/5/7 枚</div><div>前方得分</div></div><button class="startBtn" id="startBtn">开始游戏</button></div></div>
<div class="panel result" id="resultPanel"><div class="card"><div class="brandLogo">￥</div><h1 id="resultTitle">本局结束</h1><p id="resultText"></p><button class="startBtn" id="againBtn">再来一局</button></div></div>
<script>
const cvs=document.getElementById('game'),ctx=cvs.getContext('2d'),dropBtn=document.getElementById('dropBtn'),restartBtn=document.getElementById('restartBtn'),rulesBtn=document.getElementById('rulesBtn'),scoreEl=document.getElementById('score'),shotsEl=document.getElementById('shots'),startPanel=document.getElementById('startPanel'),resultPanel=document.getElementById('resultPanel'),resultTitle=document.getElementById('resultTitle'),resultText=document.getElementById('resultText'),againBtn=document.getElementById('againBtn'),nickInput=document.getElementById('nickInput'),avatarList=document.getElementById('avatarList'),topName=document.getElementById('topName'),topAvatar=document.getElementById('topAvatar');
const AV=['😄','🐱','🐶','🐼','🦊','🐵','🐸','🐯','🐰','⭐'],PROFILE_KEY='coinPusherProfileV2',DRAW=[1,3,5,7],CFG={shots:30,target:50,startCoins:58,maxCoins:92,maxDropPerPush:5};let W=300,H=420,dpr=1,coins=[],sparks=[],dropX=.5,pusherT=0,activeUntil=0,pushDrops=0,score=0,shots=30,lost=0,ended=false,lastUi=0,selectedAvatar='😄',audio=null,soundReady=false,paused=false,drawIndex=0,drawUntil=0,drawResult=1,dropQueue=[],nextDropAt=0,notice='';
function loadProfile(){try{return JSON.parse(localStorage.getItem(PROFILE_KEY)||'{}')}catch(e){return {}}}function saveProfile(){localStorage.setItem(PROFILE_KEY,JSON.stringify({name:nickInput.value.trim()||'玩家',avatar:selectedAvatar}))}function renderAvatars(){avatarList.innerHTML=AV.map(a=>`<button class="pick ${a===selectedAvatar?'active':''}" data-a="${a}">${a}</button>`).join('');avatarList.querySelectorAll('button').forEach(b=>b.onclick=()=>{selectedAvatar=b.dataset.a;renderAvatars()})}const pf=loadProfile();nickInput.value=pf.name||'';selectedAvatar=pf.avatar||'😄';renderAvatars();
function resize(){const r=cvs.getBoundingClientRect();dpr=window.devicePixelRatio||1;W=Math.floor(r.width);H=Math.floor(r.height);cvs.width=Math.floor(W*dpr);cvs.height=Math.floor(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0)}window.addEventListener('resize',resize);document.addEventListener('visibilitychange',()=>paused=document.hidden);resize();
function rand(a,b){return Math.random()*(b-a)+a}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function active(){return performance.now()<activeUntil}function drawing(){return performance.now()<drawUntil}function busy(){return active()||drawing()||dropQueue.length>0}function play(f,d=.05,t='sine',g=.025){if(!soundReady)return;try{audio=audio||new(window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),v=audio.createGain();o.type=t;o.frequency.value=f;v.gain.value=g;o.connect(v);v.connect(audio.destination);o.start();v.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.stop(audio.currentTime+d)}catch(e){}}
function geom(){return{topPanel:H*.14,drawY:H*.12,dropY:H*.17,tableTop:H*.31,tableBack:H*.44,tableFront:H*.78,fallEnd:H*.94,leftTop:W*.25,rightTop:W*.75,leftFront:W*.08,rightFront:W*.92,slotLeft:W*.18,slotRight:W*.82,pusherBack:H*.33,pusherTravel:H*.1}}function lb(y){let g=geom(),t=clamp((y-g.tableTop)/(g.tableFront-g.tableTop),0,1);return g.leftTop+(g.leftFront-g.leftTop)*t}function rb(y){let g=geom(),t=clamp((y-g.tableTop)/(g.tableFront-g.tableTop),0,1);return g.rightTop+(g.rightFront-g.rightTop)*t}
function newGame(){score=0;shots=CFG.shots;lost=0;ended=false;activeUntil=0;pusherT=0;pushDrops=0;dropQueue=[];drawUntil=0;notice='';coins=[];sparks=[];seedCoins();ui(true);resultPanel.style.display='none'}
function coinKind(){let r=Math.random(),kind=r>.96?'star':r>.82?'big':'normal';return{kind,val:kind==='star'?10:kind==='big'?5:1,r:kind==='star'?15:kind==='big'?14:12}}
function makeCoin(x,y,state='onTable'){let k=coinKind();return{x,y,landingY:y,vx:rand(-.1,.1),vy:0,rot:rand(0,6.28),lock:state==='onTable'?0:22,state,dead:false,...k}}
function seedCoins(){let g=geom(),cols=9;for(let i=0;i<CFG.startCoins;i++){let row=Math.floor(i/cols),col=i%cols,y=g.tableBack+row*17+rand(-5,5),x=lb(y)+28+col*((rb(y)-lb(y)-56)/(cols-1))+rand(-4,4);if(y>g.pusherBack+54&&y<g.tableFront-16)coins.push(makeCoin(x,y,'onTable'))}}
function pickDraw(){let r=Math.random();return r<.46?1:r<.76?3:r<.93?5:7}
function startDraw(){if(ended||shots<=0||busy())return;shots--;pushDrops=0;notice='';drawResult=pickDraw();drawUntil=performance.now()+820;ui(true);play(760,.04,'triangle');if(navigator.vibrate)navigator.vibrate(15)}
function scheduleDrop(n){dropQueue=[];for(let i=0;i<n;i++)dropQueue.push(i);nextDropAt=performance.now();activeUntil=performance.now()+4300+n*110;notice='抽中 '+n+' 枚'}
function spawnCoin(i=0){let g=geom(),base=W*.14+dropX*W*.72,x=clamp(base+rand(-20,20)+(i%3-1)*9,lb(g.tableBack)+18,rb(g.tableBack)-18),c=makeCoin(x,g.dropY,'falling');c.vy=1.8+rand(0,.2);c.landingY=g.tableBack+rand(-8,12);coins.push(c);play(720,.035,'triangle',.014)}
function processQueue(){let now=performance.now();if(drawing()&&now+16>=drawUntil){drawUntil=0;let idx=DRAW.indexOf(drawResult);drawIndex=idx<0?0:idx;scheduleDrop(drawResult)}if(dropQueue.length&&now>=nextDropAt){let i=dropQueue.shift();spawnCoin(i);nextDropAt=now+115}}
function win(c){score+=c.val;burst(c.x,geom().fallEnd-10,c.kind==='star'?22:12);notice='+'+c.val;play(c.val>1?1050:850,.06,'square',.018);if(navigator.vibrate)navigator.vibrate(c.val>1?[20,30,20]:12)}function lose(c){lost++;burst(c.x,c.y,5);play(260,.04,'sine',.012)}function burst(x,y,n){for(let i=0;i<n;i++)sparks.push({x,y,vx:rand(-2.3,2.3),vy:rand(-3,-.4),life:rand(18,34),r:rand(2,4)})}
function ui(force=false){let now=performance.now();if(!force&&now-lastUi<140)return;lastUi=now;scoreEl.textContent=score;shotsEl.textContent=shots;dropBtn.textContent=drawing()?'抽取中':active()?'推动中':'抽金币';dropBtn.disabled=ended||shots<=0||busy();topName.textContent=(nickInput.value.trim()||'玩家');topAvatar.textContent=selectedAvatar}
function maybeEnd(){if(ended||busy()||shots>0)return;if(coins.some(c=>c.state==='falling'||c.state==='dropping'))return;ended=true;setTimeout(()=>{resultTitle.textContent=score>=CFG.target?'恭喜通关':'差一点，再来一局';resultText.textContent=`${nickInput.value.trim()||'玩家'} 本局获得 ${score} 分，目标 ${CFG.target} 分，侧边损失 ${lost} 枚。`;resultPanel.style.display='grid'},450)}
function collideCoins(){let arr=coins.filter(c=>c.state==='onTable');for(let i=0;i<arr.length;i++){let a=arr[i];for(let j=i+1;j<arr.length;j++){let b=arr[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy),m=a.r+b.r-1.8;if(d>0&&d<m){let nx=dx/d,ny=dy/d,p=(m-d)*.45;a.x+=nx*p*.5;a.y+=ny*p*.5;b.x-=nx*p*.5;b.y-=ny*p*.5;let rel=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;if(rel<0){let imp=-rel*.16;a.vx+=nx*imp;b.vx-=nx*imp;a.vy+=ny*imp;b.vy-=ny*imp}}}}}
function update(){if(paused)return geom().pusherBack;processQueue();let g=geom(),is=active();pusherT+=is?.07:.018;let travel=(Math.sin(pusherT-Math.PI/2)+1)/2,pusherY=g.pusherBack+travel*g.pusherTravel,pusherBottom=pusherY+34,movingForward=Math.cos(pusherT-Math.PI/2)>-.15;for(let c of coins){c.rot+=.025+Math.abs(c.vx)*.025;if(c.state==='falling'){c.y+=c.vy;c.vy+=.08;c.x+=c.vx;if(c.y>=c.landingY){c.y=c.landingY;c.vy=0;c.vx*=.2;c.state='onTable';c.lock=24}}else if(c.state==='onTable'){c.x+=c.vx;c.y+=c.vy;c.vx*=.82;c.vy*=.82;if(c.lock>0)c.lock--;if(is&&movingForward&&c.y>pusherY-c.r*.35&&c.y<pusherBottom+c.r&&c.x>lb(c.y)&&c.x<rb(c.y)){let force=.48+.46*travel;c.y+=force;c.vy+=force*.16;c.vx+=rand(-.045,.045)}let l=lb(c.y)+c.r,r=rb(c.y)-c.r;if(c.x<l){c.x=l;c.vx=Math.abs(c.vx)*.45}if(c.x>r){c.x=r;c.vx=-Math.abs(c.vx)*.45}if(c.y>g.tableFront-c.r*.2&&c.lock<=0){if(pushDrops<CFG.maxDropPerPush){pushDrops++;c.state='dropping';c.vy=1.3;c.vx*=.85}else{c.y=g.tableFront-c.r*.5;c.vy=-Math.abs(c.vy)*.2}}}else if(c.state==='dropping'){c.x+=c.vx;c.y+=c.vy;c.vy+=.16;c.vx*=.99;if(c.y>g.fallEnd){c.dead=true;if(c.x>g.slotLeft&&c.x<g.slotRight)win(c);else lose(c)}}}collideCoins();coins=coins.filter(c=>!c.dead).slice(-CFG.maxCoins);sparks=sparks.filter(s=>s.life>0);for(let s of sparks){s.life--;s.x+=s.vx;s.y+=s.vy;s.vy+=.13}ui();maybeEnd();return pusherY}
function drawCoin(c){ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot);let scale=c.state==='dropping'?1+.08*Math.sin(c.y*.12):1,g=ctx.createRadialGradient(-4,-5,1,0,0,c.r+5);if(c.kind==='star'){g.addColorStop(0,'#fff');g.addColorStop(.42,'#fff36a');g.addColorStop(.75,'#ff7b2b');g.addColorStop(1,'#bd3b00')}else if(c.kind==='big'){g.addColorStop(0,'#fff8ca');g.addColorStop(.46,'#ffd84e');g.addColorStop(.8,'#ef9a00');g.addColorStop(1,'#9b4c00')}else{g.addColorStop(0,'#fff6b8');g.addColorStop(.5,'#ffd24b');g.addColorStop(1,'#b76200')}ctx.scale(scale,scale);ctx.fillStyle=g;ctx.shadowColor='rgba(0,0,0,.35)';ctx.shadowBlur=5;ctx.shadowOffsetY=2;ctx.beginPath();ctx.ellipse(0,0,c.r,c.r*.74,0,0,6.28);ctx.fill();ctx.shadowColor='transparent';ctx.lineWidth=1.8;ctx.strokeStyle='rgba(255,255,255,.62)';ctx.stroke();ctx.fillStyle='#c74600';ctx.font=`900 ${c.r*.85}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(c.kind==='star'?'★':c.val,0,1);ctx.restore()}
function round(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function drawLottery(g){let w=W*.16,h=31,gap=7,x0=(W-(w*4+gap*3))/2,y=g.drawY;for(let i=0;i<4;i++){let on=i===drawIndex;ctx.fillStyle=on?'#fff2a9':'rgba(0,0,0,.54)';round(x0+i*(w+gap),y,w,h,8);ctx.fill();ctx.strokeStyle=on?'#ff4b82':'rgba(255,255,255,.28)';ctx.lineWidth=on?3:1.5;ctx.stroke();ctx.fillStyle=on?'#e53500':'#fff7bf';ctx.font='900 14px Arial';ctx.textAlign='center';ctx.fillText(DRAW[i]+'枚',x0+i*(w+gap)+w/2,y+21)}if(drawing()&&performance.now()%120<60){drawIndex=(drawIndex+1)%4;play(520+drawIndex*80,.018,'square',.006)}}
function drawTable(g){ctx.fillStyle='rgba(255,238,128,.12)';ctx.fillRect(0,0,W,g.tableTop);drawLottery(g);let grd=ctx.createLinearGradient(0,g.tableTop,0,g.tableFront);grd.addColorStop(0,'#965224');grd.addColorStop(.55,'#6b3518');grd.addColorStop(1,'#3c1a0d');ctx.fillStyle=grd;ctx.beginPath();ctx.moveTo(g.leftTop,g.tableTop);ctx.lineTo(g.rightTop,g.tableTop);ctx.lineTo(g.rightFront,g.tableFront);ctx.lineTo(g.leftFront,g.tableFront);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(255,221,122,.62)';ctx.lineWidth=3;ctx.stroke();ctx.fillStyle='rgba(0,0,0,.34)';ctx.beginPath();ctx.moveTo(g.leftFront,g.tableFront);ctx.lineTo(g.rightFront,g.tableFront);ctx.lineTo(W,g.fallEnd);ctx.lineTo(0,g.fallEnd);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(18,212,108,.34)';round(g.slotLeft,g.fallEnd-34,g.slotRight-g.slotLeft,33,13);ctx.fill();ctx.fillStyle='rgba(20,120,70,.45)';round(g.slotLeft+W*.2,g.fallEnd-28,g.slotRight-g.slotLeft-W*.4,22,11);ctx.fill();ctx.fillStyle='rgba(0,0,0,.32)';ctx.fillRect(0,g.fallEnd-34,g.slotLeft,33);ctx.fillRect(g.slotRight,g.fallEnd-34,W-g.slotRight,33)}
function drawPusher(y,g){ctx.fillStyle='#4fa2ff';round(g.leftTop+10,y,g.rightTop-g.leftTop-20,36,11);ctx.fill();ctx.fillStyle='rgba(255,255,255,.32)';ctx.fillRect(g.leftTop+24,y+7,g.rightTop-g.leftTop-48,5);ctx.fillStyle='rgba(23,80,170,.7)';ctx.fillRect(g.leftTop+10,y+31,g.rightTop-g.leftTop-20,5)}
function draw(){ctx.clearRect(0,0,W,H);let g=geom(),bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#150805');bg.addColorStop(.45,'#42200f');bg.addColorStop(1,'#1b0d07');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.08)';ctx.beginPath();ctx.moveTo(W*.16,0);ctx.lineTo(W*.4,0);ctx.lineTo(W*.29,H);ctx.lineTo(W*.04,H);ctx.closePath();ctx.fill();drawTable(g);let py=update();coins.sort((a,b)=>a.y-b.y).forEach(drawCoin);drawPusher(py,g);for(let s of sparks){ctx.globalAlpha=Math.max(0,s.life/34);ctx.fillStyle='#fff36d';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();ctx.globalAlpha=1}if(notice){ctx.fillStyle='rgba(0,0,0,.42)';round(W*.5-44,34,88,24,12);ctx.fill();ctx.fillStyle='#fff7bf';ctx.font='900 13px Arial';ctx.textAlign='center';ctx.fillText(notice,W*.5,51)}requestAnimationFrame(draw)}
cvs.addEventListener('pointerdown',e=>{const r=cvs.getBoundingClientRect();dropX=clamp((e.clientX-r.left)/r.width,.05,.95)});cvs.addEventListener('pointermove',e=>{if(e.buttons||e.pointerType==='touch'){const r=cvs.getBoundingClientRect();dropX=clamp((e.clientX-r.left)/r.width,.05,.95)}});
dropBtn.onclick=startDraw;restartBtn.onclick=()=>{newGame();notice='新的一局'};rulesBtn.onclick=()=>{notice='抽到几枚，就掉几枚'};againBtn.onclick=()=>newGame();startBtn.onclick=()=>{saveProfile();soundReady=true;startPanel.style.display='none';newGame();play(660,.07,'triangle')};newGame();draw();
</script>
